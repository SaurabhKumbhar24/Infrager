version: 1

applications:
  - appRoot: apps/web

    frontend:
      phases:
        preBuild:
          commands:
            # Install from the monorepo root so npm workspaces resolve.
            - cd ../..
            - npm install

        build:
          commands:
            - npm run build --workspace=apps/web

      artifacts:
        # Paths here are relative to appRoot (apps/web), not the repo root.
        baseDirectory: .next
        files:
          - "**/*"

      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
