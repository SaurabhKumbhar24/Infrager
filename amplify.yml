version: 1

applications:
  - appRoot: apps/web

    frontend:
      phases:
        preBuild:
          commands:
            - cd ../..
            - npm install

        build:
          commands:
            - npm run build --workspace=apps/web

      artifacts:
        baseDirectory: apps/web/.next
        files:
          - "**/*"

      cache:
        paths:
          - node_modules/**/*
          - apps/web/.next/cache/**/*